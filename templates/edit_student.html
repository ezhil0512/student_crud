{% extends "base.html" %}

{% block title %}Edit Student{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Edit Student</h2>

    <form method="POST" class="student-form">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="{{ student.name }}" required maxlength="100">
        </div>

        <div class="form-group">
            <label for="roll_no">Roll Number:</label>
            <input type="text" id="roll_no" name="roll_no" value="{{ student.roll_no }}" required maxlength="20">
        </div>

        <div class="form-group">
            <label for="class_name">Class:</label>
            <input type="text" id="class_name" name="class_name" value="{{ student.class_name }}" required maxlength="50">
        </div>

        <div class="form-group">
            <label for="address">Address:</label>
            <textarea id="address" name="address" required rows="4">{{ student.address }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Student</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
